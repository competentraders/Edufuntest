<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Examination Portal - Closed</title>
    <style>
        :root {
            --bg-dark: #0b0f19;
            --bg-card: #151b2c;
            --danger-glow: #f87171;
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --border-glow: #2a3454;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'SF Pro Display', -apple-system, 'Segoe UI', Roboto, sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-primary);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 24px;
        }

        .lockout-card {
            background-color: var(--bg-card);
            border: 1px solid var(--border-glow);
            border-radius: 16px;
            padding: 40px;
            text-align: center;
            max-width: 550px;
            width: 100%;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        .icon-shield {
            width: 64px;
            height: 64px;
            background: rgba(248, 113, 113, 0.1);
            border: 2px solid var(--danger-glow);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0 auto 24px auto;
            color: var(--danger-glow);
            font-size: 2rem;
            font-weight: bold;
        }

        h1 {
            font-size: 2rem;
            font-weight: 800;
            margin-bottom: 16px;
            color: var(--text-primary);
            letter-spacing: -0.02em;
        }

        p {
            color: var(--text-secondary);
            font-size: 1.1rem;
            line-height: 1.6;
            margin-bottom: 24px;
        }

        .footer-note {
            font-size: 0.9rem;
            color: #38bdf8;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            font-weight: 600;
        }
    </style>
</head>
<body>

    <div class="lockout-card">
        <div class="icon-shield">✕</div>
        <h1>Test is Over</h1>
        <p>The 24-hour examination window has officially closed. You can no longer access the questions or submit answers.</p>
        <div class="footer-note">Thank you.</div>
    </div>

</body>
</html>
